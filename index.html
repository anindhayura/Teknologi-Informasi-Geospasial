<html>
    <head>
        <title>geospatial mashup</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <style>#map {width:100%; height:600px}</style>
    </head>
    <body>
        <div id="map"></div>
        <script>
            var map = L.map('map').setView([-5.159847, 119.436375], 13); 

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>'
            }).addTo(map);

           // CUSTOM ICON
            var bookIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/29/29302.png',

            iconSize: [20, 20],
            iconAnchor: [11, 6],
            popupAnchor: [0, -20]
            });

        // MARKER DENGAN ICON CUSTOM
            var marker = L.marker(
            [-5.167456, 119.434198],
                {icon: bookIcon}
            ).addTo(map);

            var circle = L.circle([-5.167456, 119.434198], {
                color: '#82c8e5',
                fillColor: '#82c8e5',
                fillOpacity: 0.5,
                radius: 1000
            }).addTo(map);
            
            var polyline = L.polyline([ 
                [-5.149226, 119.434121],
                [-5.149491, 119.434816],
                [-5.149590, 119.435152],
                [-5.149270, 119.436957],
                [-5.149344, 119.437734],
                [-5.158187, 119.436578],
                [-5.167497, 119.434227]], { 
                color: '#000080', 
            }).addTo(map);

        </script>
    </body>
</html>
